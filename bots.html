<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes" />
    <meta name="description" content="BluepeakCapital - Automated Trading Bots" />
    <title>BluepeakCapital | Trading Bots</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,20 80,40 80,70 50,90 20,70 20,40' fill='%233b82f6'/%3E%3C/svg%3E" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    
    <script>
        function initTheme() {
            const savedTheme = localStorage.getItem('bluepeak_theme');
            if (savedTheme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('bluepeak_theme', 'dark');
            }
        }
        initTheme();
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --bg-input: #374151;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --nav-bg: #111827;
            --hover-bg: #374151;
            --positive: #10b981;
            --negative: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-primary: #1a1f36;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --nav-bg: #ffffff;
            --hover-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: white;
        }

        .logo-text {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #3b82f6;
        }

        .right-menu {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .flag-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .balance-display {
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-primary);
            background: var(--hover-bg);
            padding: 0.25rem 0.7rem;
            border-radius: 30px;
        }

        .hamburger-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.3rem;
            display: none;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .sidebar-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: var(--bg-secondary);
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
            z-index: 2001;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            padding: 1rem 0;
        }

        .sidebar-overlay.active .sidebar-menu {
            right: 0;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
        }

        .sidebar-menu a {
            display: block;
            padding: 0.8rem 1.2rem;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .sidebar-menu a:hover {
            background: var(--hover-bg);
            color: #3b82f6;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.75rem;
            z-index: 1000;
        }

        /* ===== BOTS PAGE STYLES ===== */
        .bots-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .bots-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .bots-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .create-bot-btn {
            padding: 0.8rem 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .create-bot-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .bot-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .bot-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }

        .bot-card.running {
            border-color: #10b981;
        }

        .bot-card.error {
            border-color: #ef4444;
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .bot-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .bot-pair {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .bot-status {
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .bot-status.running {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .bot-status.stopped {
            background: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
        }

        .bot-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .bot-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .stat {
            background: var(--bg-input);
            padding: 0.5rem;
            border-radius: 8px;
        }

        .stat-label {
            display: block;
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        .stat-value {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .stat-value.positive { color: #10b981; }
        .stat-value.negative { color: #ef4444; }

        .bot-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .bot-actions button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .start-btn {
            background: #10b981;
            color: white;
            flex: 1;
        }

        .stop-btn {
            background: #ef4444;
            color: white;
            flex: 1;
        }

        .details-btn {
            background: #3b82f6;
            color: white;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            background: var(--bg-card);
            border-radius: 16px;
            border: 2px dashed var(--border-color);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
        }

        /* ===== MODAL STYLES ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content .close {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
        }

        .modal-content .form-group {
            margin-bottom: 1rem;
        }

        .modal-content .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .modal-content .form-group input,
        .modal-content .form-group select {
            width: 100%;
            padding: 0.6rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .modal-content .submit-btn {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .modal-content .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        #gridSettings,
        #dcaSettings,
        #rsiSettings,
        #macdSettings {
            padding: 0.5rem 0;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hamburger-btn {
                display: block;
            }
            .right-menu {
                gap: 0.3rem;
            }
            .balance-display {
                font-size: 0.7rem;
                padding: 0.25rem 0.6rem;
            }
            .flag-icon {
                width: 22px;
                height: 22px;
            }
            .bots-container {
                padding: 1rem;
            }
            .bots-header h1 {
                font-size: 1.5rem;
            }
            .bots-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
                margin: 0.5rem;
            }
        }

        @media (min-width: 769px) {
            .bottom-tabs {
                display: none;
            }
        }
    </style>
</head>

    <!-- CREATE BOT MODAL -->
    <div id="createBotModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCreateBotModal()">&times;</span>
            <h2>Create New Bot</h2>
            
            <form id="createBotForm" onsubmit="createBot(event)">
                <div class="form-group">
                    <label>Bot Name</label>

                <div class="form-group">
                    <label>Trading Pair</label>
                    <select id="botPair">
                        <option value="BTC/USD">BTC/USD</option>

                </div>

                <div class="form-group">
                    <label>Strategy</label>
                    <select id="botStrategy" onchange="updateStrategySettings()">

                    <div class="form-group">
                        <label>Grid Spacing (%)</label>
                        <input type="number" id="gridSpacing" value="1" step="0.1" min="0.1" max="10">
                    </div>
                    <div class="form-group">
                        <label>Investment Per Level ($)</label>
                        <input type="number" id="investmentPerLevel" value="50" min="1">
                    </div>
                </div>

                <!-- DCA Strategy Settings -->
                <div id="dcaSettings" style="display:none;">
                    <div class="form-group">
                        <label>Interval (minutes)</label>
                        <input type="number" id="dcaInterval" value="60" min="5">
                    </div>
                    <div class="form-group">
                        <label>Amount Per Trade ($)</label>
                        <input type="number" id="dcaAmount" value="10" min="1">
                    </div>
                    <div class="form-group">
                        <label>Max Trades</label>
                        <input type="number" id="dcaMaxTrades" value="10" min="1">
                    </div>
                </div>

                <!-- RSI Strategy Settings -->
                <div id="rsiSettings" style="display:none;">
                    <div class="form-group">
                        <label>RSI Period</label>
                        <input type="number" id="rsiPeriod" value="14" min="5" max="30">
                    </div>
                    <div class="form-group">
                        <label>Oversold Level</label>
                        <input type="number" id="oversoldLevel" value="30" min="10" max="50">
                    </div>
                    <div class="form-group">
                        <label>Overbought Level</label>
                        <input type="number" id="overboughtLevel" value="70" min="50" max="90">
                    </div>
                    <div class="form-group">
                        <label>Amount Per Trade ($)</label>
                        <input type="number" id="rsiAmount" value="50" min="1">
                    </div>
                </div>

                <!-- MACD Strategy Settings -->
                <div id="macdSettings" style="display:none;">
                    <div class="form-group">
                        <label>Fast Period</label>
                        <input type="number" id="macdFast" value="12" min="5" max="20">
                    </div>
                    <div class="form-group">
                        <label>Slow Period</label>
                        <input type="number" id="macdSlow" value="26" min="15" max="40">
                    </div>
                    <div class="form-group">
                        <label>Signal Period</label>
                        <input type="number" id="macdSignal" value="9" min="5" max="15">
                    </div>
                    <div class="form-group">
                        <label>Amount Per Trade ($)</label>
                        <input type="number" id="macdAmount" value="50" min="1">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Create Bot</button>
            </form>

    <!-- DETAILS MODAL -->
    <div id="detailsModal" class="modal">
        <div class="modal-content" style="max-width: 700px;">
            <span class="close" onclick="closeDetailsModal()">&times;</span>
            <h2 id="detailsBotName">Bot Details</h2>
            <div id="detailsContent">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://txcbfzcomfyavcgqcevq.supabase.co'
        const supabaseAnonKey = 'sb_publishable_6-gQnlgqnM20wQ9iWx5lsw_ZD7Uz5bH'
        const supabase = createClient(supabaseUrl, supabaseAnonKey)

        let currentUserId = null
        let userBalances = { USD: 0, BTC: 0, ETH: 0, SOL: 0, AVAX: 0 }
        let activeBots = {}
        let allBots = []

        // ============================================
        // AUTH & BALANCE FUNCTIONS
        // ============================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession()
            
            if (!session) {
                window.location.href = 'login.html'
                return false
            }
            
            currentUserId = session.user.id
            await loadUserBalances()
            return true
        }

        async function loadUserBalances() {
            const { data, error } = await supabase
                .from('user_balances')
                .select('*')
                .eq('user_id', currentUserId)
            
            if (error) {
                console.error('Error loading balances:', error)
                return
            }
            
            if (data && data.length > 0) {
                data.forEach(balance => {
                    userBalances[balance.asset] = parseFloat(balance.balance) || 0
                })
            }
            
            if (!userBalances.USD) userBalances.USD = 0
            
            window.userBalances = userBalances
            updateBalanceDisplay()
            console.log('Balances loaded:', userBalances)
        }

        function updateBalanceDisplay() {
            const usdBalance = userBalances.USD || 0
            const balanceDisplay = document.getElementById('topBalanceDisplay')
            if (balanceDisplay) balanceDisplay.innerHTML = `$${usdBalance.toFixed(2)}`
        }

        // ============================================
        // BOT MANAGEMENT FUNCTIONS
        // ============================================
        async function loadBots() {
            const { data: bots, error } = await supabase
                .from('bot_configs')
                .select('*')
                .eq('user_id', currentUserId)
                .order('created_at', { ascending: false })

            if (error) {
                console.error('Error loading bots:', error)
                return
            }

            allBots = bots || []
            renderBots(allBots)
        }

        function renderBots(bots) {
            const grid = document.getElementById('botsGrid')
            
            if (bots.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🤖</div>
                        <h3>No Bots Created</h3>
                        <p>Create your first trading bot to start automated trading</p>
                        <button class="create-bot-btn" onclick="openCreateBotModal()" style="margin-top: 1rem;">
                            Create Your First Bot
                        </button>
                    </div>
                `
                return
            }

            grid.innerHTML = bots.map(bot => {
                const isRunning = activeBots[bot.id]?.isRunning || false
                const status = bot.status || 'stopped'
                
                return `
                <div class="bot-card ${status}" data-bot-id="${bot.id}">
                    <div class="bot-header">
                        <div class="bot-info">
                            <div class="bot-name">${bot.name}</div>
                            <div class="bot-pair">${bot.pair}</div>
                        </div>
                        <div class="bot-status ${status}">
                            ${status.toUpperCase()}
                        </div>
                    </div>

                    <div class="bot-stats">
                        <div class="stat">
                            <span class="stat-label">Strategy</span>
                            <span class="stat-value">${bot.strategy.toUpperCase()}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Trades</span>
                            <span class="stat-value">${bot.total_trades || 0}</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Profit/Loss</span>
                            <span class="stat-value ${(bot.total_profit || 0) >= 0 ? 'positive' : 'negative'}">
                                $${(bot.total_profit || 0).toFixed(2)}
                            </span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Invested</span>
                            <span class="stat-value">$${(bot.total_invested || 0).toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="bot-actions">
                        ${status === 'running' ? 
                            `<button onclick="stopBot('${bot.id}')" class="stop-btn">⏹ Stop</button>` :
                            `<button onclick="startBot('${bot.id}')" class="start-btn">▶ Start</button>`
                        }
                        <button onclick="viewBotDetails('${bot.id}')" class="details-btn">📊 Details</button>
                        <button onclick="deleteBot('${bot.id}')" class="delete-btn">🗑</button>
                    </div>
                </div>
            `}).join('')
        }

        // ============================================
        // BOT ENGINE (Simplified - Runs in browser)
        // ============================================
        class TradingBot {
            constructor(config) {
                this.id = config.id
                this.userId = config.user_id
                this.pair = config.pair
                this.strategy = config.strategy
                this.settings = config.settings
                this.isRunning = false
                this.intervalId = null
                this.priceHistory = []
            }

            async start() {
                if (this.isRunning) return
                this.isRunning = true
                
                await this.updateStatus('running')
                await this.log('info', 'Bot started')
                
                this.runLoop()
                console.log(`🤖 Bot ${this.id} started!`)
            }

            async stop() {
                this.isRunning = false
                if (this.intervalId) {
                    clearInterval(this.intervalId)
                    this.intervalId = null
                }
                await this.updateStatus('stopped')
                await this.log('info', 'Bot stopped')
                console.log(`🤖 Bot ${this.id} stopped!`)
            }

            runLoop() {
                this.intervalId = setInterval(async () => {
                    if (!this.isRunning) return
                    try {
                        await this.executeStrategy()
                    } catch (error) {
                        console.error('Bot error:', error)
                        await this.log('error', error.message)
                    }
                }, 30000)
            }

            async executeStrategy() {
                // Get current price (simplified - using Binance API)
                const price = await this.getCurrentPrice()
                const balances = await this.getUserBalances()
                const pairAsset = this.pair.split('/')[0]

                switch(this.strategy) {
                    case 'grid':
                        await this.gridStrategy(price, balances, pairAsset)
                        break
                    case 'dca':
                        await this.dcaStrategy(price, balances, pairAsset)
                        break
                    case 'rsi':
                        await this.rsiStrategy(price, balances, pairAsset)
                        break
                    case 'macd':
                        await this.macdStrategy(price, balances, pairAsset)
                        break
                }
            }

            async gridStrategy(price, balances, pairAsset) {
                const { gridLevels, gridSpacing, investmentPerLevel } = this.settings
                
                for (let i = 0; i < gridLevels; i++) {
                    const buyPrice = price * (1 - (i + 1) * gridSpacing / 100)
                    const amount = investmentPerLevel / price
                    
                    // Check if price is at buy level
                    if (price <= buyPrice) {
                        await this.executeTrade('buy', price, amount, pairAsset, balances)
                        break
                    }
                }
            }

            async dcaStrategy(price, balances, pairAsset) {
                const { interval, amountPerTrade, maxTrades } = this.settings
                
                const lastTrade = await this.getLastTrade()
                const now = Date.now()
                
                if (!lastTrade || (now - new Date(lastTrade.created_at).getTime()) >= interval * 60000) {
                    const tradeCount = await this.getTradeCount()
                    if (tradeCount < maxTrades) {
                        const amount = amountPerTrade / price
                        await this.executeTrade('buy', price, amount, pairAsset, balances)
                    }
                }
            }

            async rsiStrategy(price, balances, pairAsset) {
                const { rsiPeriod, oversoldLevel, overboughtLevel, amountPerTrade } = this.settings
                
                await this.updatePriceHistory(price)
                const rsi = this.calculateRSI(this.priceHistory, rsiPeriod)
                
                if (rsi && rsi < oversoldLevel) {
                    const amount = amountPerTrade / price
                    await this.executeTrade('buy', price, amount, pairAsset, balances)
                } else if (rsi && rsi > overboughtLevel) {
                    const balance = balances[pairAsset] || 0
                    if (balance > 0) {
                        await this.executeTrade('sell', price, balance * 0.5, pairAsset, balances)
                    }
                }
            }

            async macdStrategy(price, balances, pairAsset) {
                const { fastPeriod, slowPeriod, signalPeriod, amountPerTrade } = this.settings
                
                await this.updatePriceHistory(price)
                const macd = this.calculateMACD(this.priceHistory, fastPeriod, slowPeriod, signalPeriod)
                
                if (macd) {
                    if (macd.macdLine > macd.signalLine && 
                        this.lastMACD && this.lastMACD.macdLine <= this.lastMACD.signalLine) {
                        const amount = amountPerTrade / price
                        await this.executeTrade('buy', price, amount, pairAsset, balances)
                    }
                    this.lastMACD = macd
                }
            }

            async executeTrade(type, price, amount, pairAsset, balances) {
                const total = amount * price
                const fee = total * 0.001
                
                if (type === 'buy' && total > balances.USD) {
                    await this.log('warning', `Insufficient USD: $${balances.USD.toFixed(2)}`)
                    return
                }
                if (type === 'sell' && amount > (balances[pairAsset] || 0)) {
                    await this.log('warning', `Insufficient ${pairAsset}`)
                    return
                }
                
                // Update balances
                await this.updateBalance('USD', total, type === 'buy' ? 'subtract' : 'add')
                await this.updateBalance(pairAsset, amount, type === 'buy' ? 'add' : 'subtract')
                
                // Save trade
                await this.saveBotTrade(type, price, amount, total, fee)
                await this.updateBotStats(type, total)
                await this.log('success', `${type.toUpperCase()} ${amount} ${pairAsset} at $${price}`)
                
                // Refresh balances display
                await loadUserBalances()
            }

            // ===== HELPER FUNCTIONS =====
            async getCurrentPrice() {
                const symbol = this.pair.replace('/', '')
                try {
                    const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`)
                    const data = await response.json()
                    return parseFloat(data.price)
                } catch {
                    return 43250 // Fallback price
                }
            }

            async getUserBalances() {
                const { data } = await supabase
                    .from('user_balances')
                    .select('*')
                    .eq('user_id', this.userId)
                
                const balances = { USD: 0 }
                data.forEach(b => balances[b.asset] = b.balance)
                return balances
            }

            async updateBalance(asset, amount, operation) {
                const { data } = await supabase
                    .from('user_balances')
                    .select('balance')
                    .eq('user_id', this.userId)
                    .eq('asset', asset)
                    .single()
                
                const currentBalance = data?.balance || 0
                const newBalance = operation === 'add' ? 
                    currentBalance + amount : 
                    currentBalance - amount
                
                await supabase
                    .from('user_balances')
                    .upsert({
                        user_id: this.userId,
                        asset: asset,
                        balance: newBalance,
                        updated_at: new Date().toISOString()
                    })
            }

            async saveBotTrade(type, price, amount, total, fee) {
                const { data } = await supabase
                    .from('bot_trades')
                    .insert({
                        bot_id: this.id,
                        user_id: this.userId,
                        pair: this.pair,
                        type: type,
                        price: price,
                        amount: amount,
                        total: total,
                        fee: fee,
                        status: 'completed',
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single()
                return data
            }

            async updateBotStats(type, total) {
                const update = {
                    total_trades: supabase.raw('total_trades + 1')
                }
                if (type === 'buy') {
                    update.total_invested = supabase.raw(`total_invested + ${total}`)
                }
                await supabase
                    .from('bot_configs')
                    .update(update)
                    .eq('id', this.id)
            }

            async updateStatus(status) {
                await supabase
                    .from('bot_configs')
                    .update({
                        status: status,
                        updated_at: new Date().toISOString(),
                        last_run_at: status === 'running' ? new Date().toISOString() : null
                    })
                    .eq('id', this.id)
            }

            async log(level, message) {
                await supabase
                    .from('bot_logs')
                    .insert({
                        bot_id: this.id,
                        level: level,
                        message: message,
                        created_at: new Date().toISOString()
                    })
            }

            calculateRSI(prices, period = 14) {
                if (prices.length < period + 1) return null
                let gains = 0, losses = 0
                for (let i = prices.length - period; i < prices.length; i++) {
                    const diff = prices[i] - prices[i - 1]
                    if (diff >= 0) gains += diff
                    else losses += Math.abs(diff)
                }
                const avgGain = gains / period
                const avgLoss = losses / period
                if (avgLoss === 0) return 100
                return 100 - (100 / (1 + avgGain / avgLoss))
            }

            calculateMACD(prices, fast = 12, slow = 26, signal = 9) {
                if (prices.length < slow + signal) return null
                
                const emaFast = this.calculateEMA(prices, fast)
                const emaSlow = this.calculateEMA(prices, slow)
                const macdLine = emaFast - emaSlow
                
                const macdValues = []
                for (let i = slow; i < prices.length; i++) {
                    const fastEma = this.calculateEMA(prices.slice(0, i + 1), fast)
                    const slowEma = this.calculateEMA(prices.slice(0, i + 1), slow)
                    macdValues.push(fastEma - slowEma)
                }
                const signalLine = this.calculateEMA(macdValues, signal)
                
                return { macdLine, signalLine, histogram: macdLine - signalLine }
            }

            calculateEMA(values, period) {
                const k = 2 / (period + 1)
                let ema = values[0]
                for (let i = 1; i < values.length; i++) {
                    ema = values[i] * k + ema * (1 - k)
                }
                return ema
            }

            async getLastTrade() {
                const { data } = await supabase
                    .from('bot_trades')
                    .select('*')
                    .eq('bot_id', this.id)
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .single()
                return data
            }

            async getTradeCount() {
                const { count } = await supabase
                    .from('bot_trades')
                    .select('*', { count: 'exact', head: true })
                    .eq('bot_id', this.id)
                return count || 0
            }

            async updatePriceHistory(price) {
                this.priceHistory.push(price)
                if (this.priceHistory.length > 100) {
                    this.priceHistory.shift()
                }
            }
        }

        // ============================================
        // GLOBAL FUNCTIONS (Exposed to window)
        // ============================================
        window.startBot = async function(botId) {
            const bot = allBots.find(b => b.id === botId)
            if (!bot) return

            // Check if user has enough balance
            const pairAsset = bot.pair.split('/')[0]
            if (userBalances.USD < 10) {
                showToast('❌ Insufficient balance. Please deposit first.')
                return
            }

            const botEngine = new TradingBot(bot)
            await botEngine.start()
            activeBots[botId] = botEngine
            
            await loadBots()
            showToast(`🤖 ${bot.name} started!`)
        }

        window.stopBot = async function(botId) {
            if (activeBots[botId]) {
                await activeBots[botId].stop()
                delete activeBots[botId]
                await loadBots()
                showToast('⏹ Bot stopped')
            }
        }

        window.deleteBot = async function(botId) {
            if (!confirm('⚠️ Delete this bot?')) return
            
            if (activeBots[botId]) {
                await activeBots[botId].stop()
                delete activeBots[botId]
            }

            await supabase
                .from('bot_configs')
                .delete()
                .eq('id', botId)

            await loadBots()
            showToast('🗑 Bot deleted')
        }

        window.viewBotDetails = async function(botId) {
            const bot = allBots.find(b => b.id === botId)
            if (!bot) return

            const { data: trades } = await supabase
                .from('bot_trades')
                .select('*')
                .eq('bot_id', botId)
                .order('created_at', { ascending: false })
                .limit(10)

            const { data: logs } = await supabase
                .from('bot_logs')
                .select('*')
                .eq('bot_id', botId)
                .order('created_at', { ascending: false })
                .limit(10)

            document.getElementById('detailsBotName').textContent = `${bot.name} - Details`
            
            let html = `
                <div style="margin-bottom: 1rem;">
                    <p><strong>Pair:</strong> ${bot.pair}</p>
                    <p><strong>Strategy:</strong> ${bot.strategy.toUpperCase()}</p>
                    <p><strong>Status:</strong> ${bot.status}</p>
                    <p><strong>Total Trades:</strong> ${bot.total_trades || 0}</p>
                    <p><strong>Total Invested:</strong> $${(bot.total_invested || 0).toFixed(2)}</p>
                    <p><strong>Profit/Loss:</strong> $${(bot.total_profit || 0).toFixed(2)}</p>
                </div>
                <hr style="border-color: var(--border-color); margin: 1rem 0;">
                <h3>Recent Trades</h3>
                ${trades.length === 0 ? '<p style="color: var(--text-secondary);">No trades yet</p>' : 
                    trades.map(t => `
                        <div style="display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid var(--border-color);">
                            <span class="${t.type === 'buy' ? 'positive' : 'negative'}">${t.type.toUpperCase()}</span>
                            <span>${t.amount} ${t.pair.split('/')[0]}</span>
                            <span>$${t.price}</span>
                            <span style="font-size: 0.7rem; color: var(--text-secondary);">${new Date(t.created_at).toLocaleTimeString()}</span>
                        </div>
                    `).join('')
                }
                <hr style="border-color: var(--border-color); margin: 1rem 0;">
                <h3>Recent Logs</h3>
                ${logs.length === 0 ? '<p style="color: var(--text-secondary);">No logs yet</p>' :
                    logs.map(l => `
                        <div style="display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid var(--border-color); font-size: 0.8rem;">
                            <span>${l.message}</span>
                            <span style="color: var(--text-secondary); font-size: 0.6rem;">${new Date(l.created_at).toLocaleTimeString()}</span>
                        </div>
                    `).join('')
                }
            `
            
            document.getElementById('detailsContent').innerHTML = html
            document.getElementById('detailsModal').classList.add('active')
        }

        window.closeDetailsModal = function() {
            document.getElementById('detailsModal').classList.remove('active')
        }

        // ============================================
        // MODAL FUNCTIONS
        // ============================================
        window.openCreateBotModal = function() {
            document.getElementById('createBotModal').classList.add('active')
        }

        window.closeCreateBotModal = function() {
            document.getElementById('createBotModal').classList.remove('active')
        }

        window.updateStrategySettings = function() {
            const strategy = document.getElementById('botStrategy').value
            document.getElementById('gridSettings').style.display = strategy === 'grid' ? 'block' : 'none'
            document.getElementById('dcaSettings').style.display = strategy === 'dca' ? 'block' : 'none'
            document.getElementById('rsiSettings').style.display = strategy === 'rsi' ? 'block' : 'none'
            document.getElementById('macdSettings').style.display = strategy === 'macd' ? 'block' : 'none'
        }

        window.createBot = async function(event) {
            event.preventDefault()
            
            const name = document.getElementById('botName').value
            const pair = document.getElementById('botPair').value
            const strategy = document.getElementById('botStrategy').value

            let settings = {}
            switch(strategy) {
                case 'grid':
                    settings = {
                        gridLevels: parseInt(document.getElementById('gridLevels').value),
                        gridSpacing: parseFloat(document.getElementById('gridSpacing').value),
                        investmentPerLevel: parseFloat(document.getElementById('investmentPerLevel').value)
                    }
                    break
                case 'dca':
                    settings = {
                        interval: parseInt(document.getElementById('dcaInterval').value),
                        amountPerTrade: parseFloat(document.getElementById('dcaAmount').value),
                        maxTrades: parseInt(document.getElementById('dcaMaxTrades').value)
                    }
                    break
                case 'rsi':
                    settings = {
                        rsiPeriod: parseInt(document.getElementById('rsiPeriod').value),
                        oversoldLevel: parseInt(document.getElementById('oversoldLevel').value),
                        overboughtLevel: parseInt(document.getElementById('overboughtLevel').value),
                        amountPerTrade: parseFloat(document.getElementById('rsiAmount').value)
                    }
                    break
                case 'macd':
                    settings = {
                        fastPeriod: parseInt(document.getElementById('macdFast').value),
                        slowPeriod: parseInt(document.getElementById('macdSlow').value),
                        signalPeriod: parseInt(document.getElementById('macdSignal').value),
                        amountPerTrade: parseFloat(document.getElementById('macdAmount').value)
                    }
                    break
            }

            const { data, error } = await supabase
                .from('bot_configs')
                .insert({
                    user_id: currentUserId,
                    name: name,
                    pair: pair,
                    strategy: strategy,
                    settings: settings,
                    status: 'stopped',
                    total_invested: 0,
                    total_profit: 0,
                    total_trades: 0
                })
                .select()

            if (error) {
                showToast('❌ Failed to create bot: ' + error.message)
                return
            }

            closeCreateBotModal()
            document.getElementById('createBotForm').reset()
            await loadBots()
            showToast('✅ Bot created successfully!')
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showToast(msg) {
            const toast = document.createElement('div')
            toast.className = 'toast'
            toast.textContent = msg
            document.body.appendChild(toast)
            setTimeout(() => toast.remove(), 3000)
        }

        function openSidebar() {
            document.getElementById('sidebarOverlay').classList.add('active')
        }

        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('active')
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            const authenticated = await checkAuth()
            if (authenticated) {
                await loadBots()
            }
        }

        init()

        // Auto-refresh balance every 10 seconds
        setInterval(async () => {
            if (currentUserId) {
                await loadUserBalances()
            }
        }, 10000)

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active')
            }
        }
    </script>
