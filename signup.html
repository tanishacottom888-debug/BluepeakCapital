<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=yes" />
    <title>BluepeakCapital | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1f2937;
            --bg-input: #374151;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #2563eb;
            --positive: #10b981;
            --negative: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #f5f7fb;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --text-primary: #1a1f36;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .auth-logo h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-logo p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .form-group label .required {
            color: #ef4444;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-group input.error {
            border-color: #ef4444;
        }

        .form-group .error-text {
            color: #ef4444;
            font-size: 0.7rem;
            margin-top: 0.3rem;
            display: none;
        }

        .form-group .error-text.show {
            display: block;
        }

        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .auth-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.7rem;
        }

        /* ============================================
           VERIFICATION STEP
           ============================================ */
        .verification-step {
            display: none;
        }

        .verification-step.active {
            display: block;
        }

        .verification-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .verification-header .icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .verification-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .verification-header p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        .verification-header .email-highlight {
            color: #3b82f6;
            font-weight: 600;
        }

        .code-input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .code-input-group input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .code-input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .code-input-group input.error {
            border-color: #ef4444;
        }

        .code-input-group input.filled {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .resend-section {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .resend-section .resend-btn {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 600;
        }

        .resend-section .resend-btn:hover {
            text-decoration: underline;
        }

        .resend-section .timer {
            color: var(--text-secondary);
        }

        .resend-section .timer .time {
            color: #f59e0b;
            font-weight: 600;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            text-align: center;
            min-width: 200px;
            max-width: 90vw;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-notification.success { background: #059669; }
        .toast-notification.error { background: #dc2626; }
        .toast-notification.info { background: #3b82f6; }

        .password-hint {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1rem;
            }
            .auth-card {
                padding: 1.5rem;
            }
            .code-input-group input {
                width: 40px;
                height: 48px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- ============================================ -->
            <!-- STEP 1: REGISTRATION FORM -->
            <!-- ============================================ -->
            <div id="step1">
                <div class="auth-logo">
                    <div class="logo-icon">⛰️</div>
                    <h1>BluepeakCapital</h1>
                    <p>Create your account</p>
                </div>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="••••••••" minlength="6" required>
                        <div class="password-hint">Must be at least 6 characters</div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password <span class="required">*</span></label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-primary" id="signupBtn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>

            <!-- ============================================ -->
            <!-- STEP 2: EMAIL VERIFICATION -->
            <!-- ============================================ -->
            <div id="step2" class="verification-step">
                <div class="verification-header">
                    <div class="icon">📧</div>
                    <h2>Verify Your Email</h2>
                    <p>
                        We've sent a verification code to<br>
                        <span class="email-highlight" id="verificationEmail">your email</span>
                    </p>
                </div>

                <div class="code-input-group" id="codeInputGroup">
                    <input type="text" maxlength="1" class="code-input" data-index="0" autofocus>
                    <input type="text" maxlength="1" class="code-input" data-index="1">
                    <input type="text" maxlength="1" class="code-input" data-index="2">
                    <input type="text" maxlength="1" class="code-input" data-index="3">
                    <input type="text" maxlength="1" class="code-input" data-index="4">
                    <input type="text" maxlength="1" class="code-input" data-index="5">
                </div>

                <button class="btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <i class="fas fa-check-circle"></i> Verify Email
                </button>

                <div class="resend-section" style="margin-top: 1rem;">
                    <span>Didn't receive the code? </span>
                    <button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend Code</button>
                    <span class="timer" id="timerDisplay">
                        <span class="time" id="timerTime">60</span>s
                    </span>
                </div>

                <div class="auth-footer" style="margin-top: 1.5rem;">
                    <button class="btn-secondary" onclick="goBackToSignup()">
                        <i class="fas fa-arrow-left"></i> Back to Sign Up
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastMessage" class="toast-notification">Message</div>

    <script>
        // ============================================
        // SUPABASE CONFIG
        // ============================================
        const SUPABASE_URL = 'https://txcbfzcomfyavcgqcevq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6-gQnlgqnM20wQ9iWx5lsw_ZD7Uz5bH';

        let tempUserData = null;
        let verificationCode = '';
        let resendTimer = null;
        let resendCountdown = 60;

        // ============================================
        // TOAST FUNCTION
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `toast-notification ${type}`;
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================
        // GENERATE VERIFICATION CODE
        // ============================================
        function generateVerificationCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // ============================================
        // SEND VERIFICATION EMAIL
        // ============================================
        async function sendVerificationEmail(email, code) {
            try {
                // Try to send via Supabase Edge Function
                const response = await fetch(`${SUPABASE_URL}/functions/v1/send-verification`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        email: email,
                        code: code
                    })
                });

                if (!response.ok) {
                    console.error('Failed to send email via Edge Function');
                    // Fallback: Log the code for testing
                    console.log(`📧 Verification code for ${email}: ${code}`);
                    showToast(`📧 Code: ${code} (Check console)`, 'info');
                    return true;
                }

                showToast('✅ Verification code sent to your email!', 'success');
                return true;
            } catch (error) {
                console.error('Send email error:', error);
                // Fallback: Show code in console
                console.log(`📧 Verification code for ${email}: ${code}`);
                showToast(`📧 Code: ${code} (Check console)`, 'info');
                return true;
            }
        }

        // ============================================
        // HANDLE SIGNUP
        // ============================================
        async function handleSignup(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate
            if (!fullName || !email || !password || !confirmPassword) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('Please enter a valid email address', 'error');
                return;
            }

            // Disable button
            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating account...';

            try {
                // 1. Create user in Supabase Auth
                const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        data: {
                            full_name: fullName
                        }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.msg?.includes('already registered')) {
                        showToast('This email is already registered. Please login.', 'error');
                    } else {
                        showToast(data.msg || 'Signup failed. Please try again.', 'error');
                    }
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    return;
                }

                const userId = data.user?.id;
                if (!userId) {
                    showToast('Failed to create account. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    return;
                }

                // 2. Create profile
                await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        id: userId,
                        full_name: fullName,
                        email: email,
                        created_at: new Date().toISOString()
                    })
                });

                // 3. Create initial balance
                await fetch(`${SUPABASE_URL}/rest/v1/user_balances`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        asset: 'USD',
                        balance: 0,
                        created_at: new Date().toISOString()
                    })
                });

                // 4. Generate and save verification code
                verificationCode = generateVerificationCode();
                const expiresAt = new Date(Date.now() + 10 * 60000).toISOString(); // 10 minutes

                // Save to Supabase
                await fetch(`${SUPABASE_URL}/rest/v1/email_verifications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        email: email,
                        code: verificationCode,
                        expires_at: expiresAt,
                        verified: false
                    })
                });

                // 5. Send verification email
                await sendVerificationEmail(email, verificationCode);

                // 6. Store user data temporarily
                tempUserData = {
                    userId: userId,
                    email: email,
                    fullName: fullName
                };

                // 7. Show verification step
                document.getElementById('verificationEmail').textContent = email;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').classList.add('active');

                // 8. Setup code inputs
                setupCodeInputs();
                startResendTimer();

                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';

            } catch (error) {
                console.error('Signup error:', error);
                showToast('An error occurred. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        }

        // ============================================
        // SETUP CODE INPUTS
        // ============================================
        function setupCodeInputs() {
            const inputs = document.querySelectorAll('.code-input');
            
            inputs.forEach((input, index) => {
                input.value = '';
                input.classList.remove('filled', 'error');
                
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/\D/g, '');
                    
                    if (this.value.length === 1) {
                        this.classList.add('filled');
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    } else {
                        this.classList.remove('filled');
                    }
                    
                    // Auto-submit when all filled
                    const allFilled = Array.from(inputs).every(inp => inp.value.length === 1);
                    if (allFilled) {
                        setTimeout(verifyCode, 300);
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                        inputs[index - 1].classList.remove('filled');
                    }
                });

                // Paste support
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/\D/g, '').slice(0, 6);
                    
                    if (digits) {
                        const digitsArray = digits.split('');
                        inputs.forEach((inp, i) => {
                            if (i < digitsArray.length) {
                                inp.value = digitsArray[i];
                                inp.classList.add('filled');
                            }
                        });
                        // Focus the next empty input
                        const nextEmpty = Array.from(inputs).find(inp => inp.value.length === 0);
                        if (nextEmpty) {
                            nextEmpty.focus();
                        } else {
                            setTimeout(verifyCode, 300);
                        }
                    }
                });
            });

            // Focus first input
            inputs[0].focus();
        }

        // ============================================
        // VERIFY CODE
        // ============================================
        async function verifyCode() {
            const inputs = document.querySelectorAll('.code-input');
            const code = Array.from(inputs).map(inp => inp.value).join('');
            
            if (code.length !== 6) {
                showToast('Please enter the complete 6-digit code', 'error');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';

            try {
                // Check if code matches
                if (code !== verificationCode) {
                    showToast('❌ Invalid verification code. Please try again.', 'error');
                    inputs.forEach(inp => inp.classList.add('error'));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify Email';
                    return;
                }

                // Verify in Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/email_verifications`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        verified: true
                    }),
                    params: {
                        user_id: `eq.${tempUserData.userId}`
                    }
                });

                showToast('✅ Email verified successfully!', 'success');
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Verification error:', error);
                showToast('Verification failed. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Verify Email';
            }
        }

        // ============================================
        // RESEND CODE
        // ============================================
        async function resendCode() {
            if (resendTimer && resendCountdown > 0) {
                showToast(`Please wait ${resendCountdown} seconds before resending`, 'warning');
                return;
            }

            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                // Generate new code
                verificationCode = generateVerificationCode();
                const expiresAt = new Date(Date.now() + 10 * 60000).toISOString();

                // Update in Supabase
                await fetch(`${SUPABASE_URL}/rest/v1/email_verifications`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        code: verificationCode,
                        expires_at: expiresAt,
                        verified: false
                    }),
                    params: {
                        user_id: `eq.${tempUserData.userId}`
                    }
                });

                // Send email
                await sendVerificationEmail(tempUserData.email, verificationCode);

                // Reset code inputs
                document.querySelectorAll('.code-input').forEach(inp => {
                    inp.value = '';
                    inp.classList.remove('filled', 'error');
                });
                document.querySelectorAll('.code-input')[0].focus();

                // Start timer
                startResendTimer();
                showToast('✅ New code sent to your email!', 'success');

            } catch (error) {
                console.error('Resend error:', error);
                showToast('Failed to resend code. Please try again.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Resend Code';
        }

        // ============================================
        // START RESEND TIMER
        // ============================================
        function startResendTimer() {
            if (resendTimer) clearInterval(resendTimer);
            resendCountdown = 60;
            
            const timerDisplay = document.getElementById('timerDisplay');
            const timerTime = document.getElementById('timerTime');
            const resendBtn = document.getElementById('resendBtn');
            
            timerDisplay.style.display = 'inline';
            timerTime.textContent = resendCountdown;
            resendBtn.disabled = true;

            resendTimer = setInterval(() => {
                resendCountdown--;
                timerTime.textContent = resendCountdown;
                
                if (resendCountdown <= 0) {
                    clearInterval(resendTimer);
                    resendTimer = null;
                    timerDisplay.style.display = 'none';
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        // ============================================
        // GO BACK TO SIGNUP
        // ============================================
        function goBackToSignup() {
            if (resendTimer) {
                clearInterval(resendTimer);
                resendTimer = null;
            }
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').classList.remove('active');
        }

        // ============================================
        // AUTO-REDIRECT IF ALREADY LOGGED IN
        // ============================================
        async function checkAuth() {
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY
                    }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    if (user && user.id) {
                        // User is already logged in, redirect to dashboard
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (error) {
                console.log('Not logged in');
            }
        }

        checkAuth();
    </script>
</body>
</html>
