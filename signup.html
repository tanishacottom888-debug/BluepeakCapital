<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="BluepeakCapital - Create your institutional trading account" />
    <title>BluepeakCapital | Create Account</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='50,20 80,40 80,70 50,90 20,70 20,40' fill='%233b82f6'/%3E%3C/svg%3E" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fb 0%, #ffffff 50%, #f0f4f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            margin: 2rem;
        }

        .signup-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 1rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1a1f36, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text span {
            color: #3b82f6;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #1a1f36;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #1a1f36;
            margin-bottom: 0.5rem;
        }

        .password-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.875rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.875rem;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #4a5568;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* ============================================
           VERIFICATION STEP STYLES
           ============================================ */
        .verification-step {
            display: none;
        }

        .verification-step.active {
            display: block;
        }

        .verification-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .verification-header .icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .verification-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a1f36;
        }

        .verification-header p {
            color: #718096;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .verification-header .email-highlight {
            color: #3b82f6;
            font-weight: 600;
        }

        .code-input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .code-input-group input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .code-input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .code-input-group input.error {
            border-color: #dc2626;
        }

        .resend-section {
            text-align: center;
            font-size: 0.85rem;
            color: #718096;
            margin-top: 1rem;
        }

        .resend-section .resend-btn {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .resend-section .resend-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .resend-section .timer {
            color: #718096;
        }

        .resend-section .timer .time {
            color: #f59e0b;
            font-weight: 600;
        }

        .btn-secondary {
            width: 100%;
            padding: 0.8rem;
            background: #e2e8f0;
            color: #1a1f36;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        @media (max-width: 768px) {
            .signup-card {
                padding: 1.5rem;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .code-input-group input {
                width: 40px;
                height: 48px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <!-- ============================================ -->
            <!-- STEP 1: REGISTRATION FORM -->
            <!-- ============================================ -->
            <div id="step1">
                <div class="logo">
                    <div class="logo-icon">⛰️</div>
                    <div class="logo-text">Bluepeak<span>Capital</span></div>
                </div>
                
                <h1>Create account</h1>
                <p class="subtitle">Start trading with institutional-grade infrastructure</p>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <form id="signupForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First name</label>
                            <input type="text" id="firstName" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label>Last name</label>
                            <input type="text" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email address</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Create a password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('password', 'passwordIcon')">
                                <svg id="passwordIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', 'confirmPasswordIcon')">
                                <svg id="confirmPasswordIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="signupBtn">Create Account →</button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="login.html">Sign in →</a>
                </div>
            </div>

            <!-- ============================================ -->
            <!-- STEP 2: EMAIL VERIFICATION -->
            <!-- ============================================ -->
            <div id="step2" class="verification-step">
                <div class="verification-header">
                    <div class="icon">📧</div>
                    <h2>Verify Your Email</h2>
                    <p>
                        We've sent a verification code to<br>
                        <span class="email-highlight" id="verificationEmail">your email</span>
                    </p>
                </div>

                <div class="code-input-group" id="codeInputGroup">
                    <input type="text" maxlength="1" class="code-input" data-index="0" autofocus>
                    <input type="text" maxlength="1" class="code-input" data-index="1">
                    <input type="text" maxlength="1" class="code-input" data-index="2">
                    <input type="text" maxlength="1" class="code-input" data-index="3">
                    <input type="text" maxlength="1" class="code-input" data-index="4">
                    <input type="text" maxlength="1" class="code-input" data-index="5">
                </div>

                <button class="btn-primary" id="verifyBtn" onclick="verifyCode()">
                    <i class="fas fa-check-circle"></i> Verify Email
                </button>

                <div class="resend-section">
                    <span>Didn't receive the code? </span>
                    <button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend Code</button>
                    <span class="timer" id="timerDisplay">
                        <span class="time" id="timerTime">60</span>s
                    </span>
                </div>

                <button class="btn-secondary" onclick="goBackToSignup()">
                    <i class="fas fa-arrow-left"></i> Back to Sign Up
                </button>
            </div>
        </div>
    </div>

    <div id="toastMessage" style="display:none;"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = 'https://txcbfzcomfyavcgqcevq.supabase.co'
        const supabaseAnonKey = 'sb_publishable_6-gQnlgqnM20wQ9iWx5lsw_ZD7Uz5bH'
        const supabase = createClient(supabaseUrl, supabaseAnonKey)

        // ============================================
        // VARIABLES
        // ============================================
        let tempUserData = null;
        let verificationCode = '';
        let resendTimer = null;
        let resendCountdown = 60;

        const signupForm = document.getElementById('signupForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');

        // ============================================
        // TOAST FUNCTION
        // ============================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toastMessage');
            toast.textContent = message;
            toast.className = `toast-notification ${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // ============================================
        // PASSWORD TOGGLE
        // ============================================
        window.togglePassword = function(fieldId, iconId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(iconId);
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            } else {
                field.type = 'password';
                icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            }
        }

        // ============================================
        // GENERATE VERIFICATION CODE
        // ============================================
        function generateVerificationCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // ============================================
        // SEND VERIFICATION EMAIL
        // ============================================
        async function sendVerificationEmail(email, code) {
            try {
                const response = await fetch(`${supabaseUrl}/functions/v1/send-verification`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${supabaseAnonKey}`
                    },
                    body: JSON.stringify({
                        email: email,
                        code: code
                    })
                });

                const data = await response.json();
                console.log('📧 Email response:', data);
                return data;
            } catch (error) {
                console.error('Send email error:', error);
                return null;
            }
        }

        // ============================================
        // SIGNUP FORM SUBMIT
        // ============================================
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!firstName || !lastName || !email || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            const submitBtn = document.getElementById('signupBtn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Creating account...';
            submitBtn.disabled = true;

            try {
                // ============================================
                // STEP 1: Create user in Supabase Auth
                // ============================================
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            full_name: `${firstName} ${lastName}`
                        }
                    }
                });

                if (error) {
                    showError(error.message);
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    return;
                }

                if (!data.user) {
                    showError('Failed to create account. Please try again.');
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    return;
                }

                const userId = data.user.id;
                console.log('✅ User created:', userId);

                // ============================================
                // STEP 2: Create profile (skip if fails)
                // ============================================
                try {
                    await supabase
                        .from('profiles')
                        .upsert({
                            id: userId,
                            email: email,
                            full_name: `${firstName} ${lastName}`,
                            created_at: new Date().toISOString()
                        });
                    console.log('✅ Profile created');
                } catch (profileErr) {
                    console.log('Profile creation skipped:', profileErr);
                }

                // ============================================
                // STEP 3: Create initial balance (skip if fails)
                // ============================================
                try {
                    await supabase
                        .from('user_balances')
                        .upsert({
                            user_id: userId,
                            asset: 'USD',
                            balance: 0,
                            created_at: new Date().toISOString()
                        });
                    console.log('✅ Balance created');
                } catch (balanceErr) {
                    console.log('Balance creation skipped:', balanceErr);
                }

                // ============================================
                // STEP 4: Generate and send verification code
                // ============================================
                verificationCode = generateVerificationCode();
                
                const emailResult = await sendVerificationEmail(email, verificationCode);
                console.log('📧 Email result:', emailResult);

                // ============================================
                // STEP 5: Show verification step
                // ============================================
                tempUserData = {
                    userId: userId,
                    email: email,
                    fullName: `${firstName} ${lastName}`
                };

                document.getElementById('verificationEmail').textContent = email;
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').classList.add('active');

                setupCodeInputs();
                startResendTimer();

                showToast('✅ Verification code sent to your email!', 'success');

            } catch (err) {
                console.error('Signup error:', err);
                showError('Network error. Please try again.');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });

        // ============================================
        // SHOW ERROR
        // ============================================
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }

        // ============================================
        // SETUP CODE INPUTS
        // ============================================
        function setupCodeInputs() {
            const inputs = document.querySelectorAll('.code-input');
            
            inputs.forEach((input, index) => {
                input.value = '';
                input.classList.remove('error');
                
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/\D/g, '');
                    
                    if (this.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    
                    const allFilled = Array.from(inputs).every(inp => inp.value.length === 1);
                    if (allFilled) {
                        setTimeout(verifyCode, 300);
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                });

                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const paste = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = paste.replace(/\D/g, '').slice(0, 6);
                    
                    if (digits) {
                        const digitsArray = digits.split('');
                        inputs.forEach((inp, i) => {
                            if (i < digitsArray.length) {
                                inp.value = digitsArray[i];
                            }
                        });
                        // Focus the next empty input
                        const nextEmpty = Array.from(inputs).find(inp => inp.value.length === 0);
                        if (nextEmpty) {
                            nextEmpty.focus();
                        } else {
                            setTimeout(verifyCode, 300);
                        }
                    }
                });
            });

            inputs[0].focus();
        }

        // ============================================
        // VERIFY CODE
        // ============================================
        window.verifyCode = async function() {
            const inputs = document.querySelectorAll('.code-input');
            const code = Array.from(inputs).map(inp => inp.value).join('');
            
            if (code.length !== 6) {
                showToast('Please enter the complete 6-digit code', 'error');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';

            try {
                if (code !== verificationCode) {
                    showToast('❌ Invalid verification code. Please try again.', 'error');
                    inputs.forEach(inp => inp.classList.add('error'));
                    btn.disabled = false;
                    btn.innerHTML = 'Verify Email';
                    return;
                }

                showToast('✅ Email verified successfully!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                console.error('Verification error:', error);
                showToast('Verification failed. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Verify Email';
            }
        }

        // ============================================
        // RESEND CODE
        // ============================================
        window.resendCode = async function() {
            if (resendTimer && resendCountdown > 0) {
                showToast(`Please wait ${resendCountdown} seconds`, 'warning');
                return;
            }

            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                verificationCode = generateVerificationCode();

                const emailResult = await sendVerificationEmail(tempUserData.email, verificationCode);
                console.log('📧 Resend result:', emailResult);

                document.querySelectorAll('.code-input').forEach(inp => {
                    inp.value = '';
                    inp.classList.remove('error');
                });
                document.querySelectorAll('.code-input')[0].focus();

                startResendTimer();
                showToast('✅ New code sent to your email!', 'success');

            } catch (error) {
                console.error('Resend error:', error);
                showToast('Failed to resend code. Please try again.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Resend Code';
        }

        // ============================================
        // START RESEND TIMER
        // ============================================
        function startResendTimer() {
            if (resendTimer) clearInterval(resendTimer);
            resendCountdown = 60;
            
            const timerDisplay = document.getElementById('timerDisplay');
            const timerTime = document.getElementById('timerTime');
            const resendBtn = document.getElementById('resendBtn');
            
            timerDisplay.style.display = 'inline';
            timerTime.textContent = resendCountdown;
            resendBtn.disabled = true;

            resendTimer = setInterval(() => {
                resendCountdown--;
                timerTime.textContent = resendCountdown;
                
                if (resendCountdown <= 0) {
                    clearInterval(resendTimer);
                    resendTimer = null;
                    timerDisplay.style.display = 'none';
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        // ============================================
        // GO BACK TO SIGNUP
        // ============================================
        window.goBackToSignup = function() {
            if (resendTimer) {
                clearInterval(resendTimer);
                resendTimer = null;
            }
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').classList.remove('active');
        }

        // ============================================
        // CHECK IF ALREADY LOGGED IN
        // ============================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkAuth();

        // ============================================
        // TOAST STYLES (dynamic)
        // ============================================
        const style = document.createElement('style');
        style.textContent = `
            .toast-notification {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: #1e293b;
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                font-size: 0.85rem;
                font-weight: 500;
                z-index: 3000;
                opacity: 0;
                transition: all 0.3s ease;
                pointer-events: none;
                text-align: center;
                min-width: 200px;
                max-width: 90vw;
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            }
            .toast-notification.show {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
            .toast-notification.success { background: #059669; }
            .toast-notification.error { background: #dc2626; }
            .toast-notification.info { background: #3b82f6; }
            .toast-notification.warning { background: #f59e0b; }
        `;
        document.head.appendChild(style);

        // Fix toast display
        const toast = document.getElementById('toastMessage');
        const originalShowToast = showToast;
        window.showToast = function(message, type = 'info') {
            toast.textContent = message;
            toast.className = `toast-notification ${type}`;
            toast.style.display = 'block';
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
