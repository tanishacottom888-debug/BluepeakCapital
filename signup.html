<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Test</title>
</head>
<body>
    <h1>Sign Up Test</h1>
    <form id="signupForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Sign Up</button>
    </form>
    <div id="result"></div>

    <script>
        const SUPABASE_URL = 'https://txcbfzcomfyavcgqcevq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_6-gQnlgqnM20wQ9iWx5lsw_ZD7Uz5bH';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');

            result.textContent = 'Creating account...';

            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        data: { full_name: 'Test User' }
                    })
                });

                const data = await response.json();
                console.log('Response:', data);

                if (!response.ok) {
                    result.textContent = `❌ Error: ${data.msg || data.error_description || 'Unknown error'}`;
                    result.style.color = 'red';
                } else {
                    result.textContent = '✅ Account created! Check your email.';
                    result.style.color = 'green';
                }
            } catch (err) {
                result.textContent = '❌ Network error: ' + err.message;
                result.style.color = 'red';
            }
        });
    </script>
</body>
</html>
